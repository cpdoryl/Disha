# Grafana Datasources Configuration for Disha Staging
# Automatically provisions datasources when Grafana starts

apiVersion: 1

datasources:
  # Prometheus datasource for metrics
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus-staging:9090
    isDefault: true
    jsonData:
      timeInterval: '15s'
    editable: true

  # Optional: Loki datasource for logs (if using Loki)
  # - name: Loki
  #   type: loki
  #   access: proxy
  #   url: http://loki:3100
  #   jsonData:
  #     maxLines: 1000
  #   editable: true

  # Optional: Elasticsearch datasource (if using ELK stack)
  # - name: Elasticsearch
  #   type: elasticsearch
  #   access: proxy
  #   url: http://elasticsearch:9200
  #   database: '[logs-]YYYY.MM.DD'
  #   jsonData:
  #     timeField: '@timestamp'
  #     esVersion: '7.10.0'
  #     logMessageField: 'message'
  #     logLevelField: 'level'
  #   editable: true
