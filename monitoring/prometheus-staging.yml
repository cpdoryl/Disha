# Prometheus Configuration for Disha Staging Environment
# Scrapes metrics from the API and other services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'disha-staging'
    environment: 'staging'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  # - "alert_rules.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'prometheus'

  # Disha API Metrics
  - job_name: 'disha-api'
    static_configs:
      - targets: ['api-staging:3000']
        labels:
          service: 'api'
          environment: 'staging'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'disha-api-staging'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Optional: Database metrics (if pg_exporter is available)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: instance
  #       replacement: 'postgres-staging'

  # Optional: Node metrics (if node_exporter is available)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: instance
  #       replacement: 'staging-host'
