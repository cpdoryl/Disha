version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: disha-postgres
    environment:
      POSTGRES_DB: disha_db
      POSTGRES_USER: disha_user
      POSTGRES_PASSWORD: disha_password_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U disha_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - disha-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: disha-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - disha-network

  # Backend API (Node.js + NestJS)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: disha-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://disha_user:disha_password_dev@postgres:5432/disha_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-key-change-in-production
      LOG_LEVEL: debug
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/node_modules:/app/node_modules
    networks:
      - disha-network
    command: npm run start:dev

  # Admin Web Dashboard (Next.js)
  frontend:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
    container_name: disha-frontend
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3000
      API_INTERNAL_URL: http://backend:3000
    ports:
      - "3001:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/admin/app:/app/app
      - ./frontend/admin/components:/app/components
      - ./frontend/admin/lib:/app/lib
      - ./frontend/admin/node_modules:/app/node_modules
    networks:
      - disha-network
    command: npm run dev

  # Extraction Service (Python + FastAPI)
  extraction:
    build:
      context: ./extraction
      dockerfile: Dockerfile
    container_name: disha-extraction
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: debug
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-dummy-key-for-dev}
      DATABASE_URL: postgresql://disha_user:disha_password_dev@postgres:5432/disha_db
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./extraction/app:/app/app
      - ./extraction/tests:/app/tests
    networks:
      - disha-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Optional: PgAdmin for Database Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: disha-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@disha.local
      PGADMIN_DEFAULT_PASSWORD: admin_password_dev
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - disha-network

  # Optional: Redis Commander for Redis Management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: disha-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - disha-network

volumes:
  postgres_data:
  redis_data:

networks:
  disha-network:
    driver: bridge

# Usage:
# docker-compose up -d              # Start all services
# docker-compose down               # Stop all services
# docker-compose logs -f backend    # View backend logs
# docker-compose exec postgres psql -U disha_user -d disha_db  # Access DB
