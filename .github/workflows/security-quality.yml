name: Security & Code Quality Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [develop, main]

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    name: Dependency Security Scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scan dependencies for vulnerabilities (npm)
        run: |
          echo "=== Backend Dependencies ==="
          cd backend && npm audit --production 2>&1 || true
          cd ../frontend/admin && npm audit --production 2>&1 || true
          cd ../../mobile && npm audit --production 2>&1 || true
          cd ../..

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Check Python dependencies
        run: |
          pip install safety
          cd extraction && safety check --json 2>&1 || true
          cd ..

  codeql-analysis:
    runs-on: ubuntu-latest
    name: CodeQL Security Analysis

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'python']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

  sonarcloud:
    runs-on: ubuntu-latest
    name: SonarCloud Code Quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONARCLOUD_TOKEN: ${{ secrets.SONARCLOUD_TOKEN }}
        continue-on-error: true

  lint-commits:
    runs-on: ubuntu-latest
    name: Lint Commit Messages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install commitlint
        run: npm install --save-dev @commitlint/cli @commitlint/config-conventional

      - name: Validate commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to HEAD
        continue-on-error: true

  docker-scan:
    runs-on: ubuntu-latest
    name: Docker Image Security Scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images for scanning
        run: |
          docker buildx build --load -t disha-api:test ./backend
          docker buildx build --load -t disha-admin:test ./frontend/admin
          docker buildx build --load -t disha-extraction:test ./extraction
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: disha-api:test
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  accessibility:
    runs-on: ubuntu-latest
    name: Accessibility Audit (Frontend)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/admin/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/admin

      - name: Build application
        run: npm run build
        working-directory: frontend/admin
        env:
          NODE_ENV: production

      - name: Run Lighthouse CI (Accessibility)
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: './frontend/admin/lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true
