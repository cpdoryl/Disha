name: Extraction Service CI - Python FastAPI

on:
  push:
    branches: [main, develop]
    paths:
      - 'extraction/**'
      - '.github/workflows/extraction-ci.yml'
  pull_request:
    branches: [develop]
    paths:
      - 'extraction/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/disha-extraction

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'extraction/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio black flake8
        working-directory: extraction

      - name: Format check (Black)
        run: black --check .
        working-directory: extraction
        continue-on-error: true

      - name: Lint (Flake8)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        working-directory: extraction
        continue-on-error: true

      - name: Run unit tests
        run: pytest tests/ -v --cov=app --cov-report=xml
        working-directory: extraction
        continue-on-error: true

      - name: Run integration tests
        run: pytest tests/integration/ -v
        working-directory: extraction
        env:
          PYTHONPATH: /app
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./extraction/coverage.xml
          flags: extraction
          name: extraction-coverage
        continue-on-error: true

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./extraction
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          pip install bandit safety

      - name: Scan for security issues (Bandit)
        run: bandit -r . -ll
        working-directory: extraction
        continue-on-error: true

      - name: Check dependencies for vulnerabilities (Safety)
        run: safety check --json
        working-directory: extraction
        continue-on-error: true
