name: Frontend (Web Dashboard) CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/admin/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [develop]
    paths:
      - 'frontend/admin/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/disha-admin

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/admin/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/admin

      - name: Run linter (ESLint)
        run: npm run lint
        working-directory: frontend/admin
        continue-on-error: true

      - name: Type check (TypeScript)
        run: npm run type-check
        working-directory: frontend/admin
        continue-on-error: true

      - name: Run unit tests
        run: npm run test:unit
        working-directory: frontend/admin
        continue-on-error: true

      - name: Build application
        run: npm run build
        working-directory: frontend/admin
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: https://api.disha.local

      - name: Check Next.js bundle size
        run: npm run analyze
        working-directory: frontend/admin
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/admin/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
        continue-on-error: true

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/admin
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Deploy to Staging
        run: |
          echo "Deploying admin dashboard to staging..."
          # Vercel deployment or similar
        env:
          DEPLOY_ENV: staging
