name: Release Pipeline

on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Extract changelog between last two tags
          PREV_TAG=$(git describe --tags --abbrev=0 ${GITHUB_REF}^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log --oneline --format="- %h: %s" > CHANGELOG.md
          else
            git log --oneline --format="- %h: %s" $PREV_TAG..${GITHUB_REF#refs/tags/} > CHANGELOG.md
          fi
          cat CHANGELOG.md

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          release_name: Release ${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false

  build-and-deploy:
    needs: create-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/disha-api:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/disha-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/admin
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/disha-admin:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/disha-admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Extraction Service
        uses: docker/build-push-action@v5
        with:
          context: ./extraction
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/disha-extraction:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/disha-extraction:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Production
        run: |
          echo "Triggering production deployment for version ${{ steps.version.outputs.VERSION }}"
          # AWS ECS update command or similar deployment trigger
          # aws ecs update-service --cluster disha-prod --service disha-api --force-new-deployment
        env:
          AWS_REGION: ap-south-1
          DEPLOY_VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Release ${{ steps.version.outputs.VERSION }} deployed to production'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author
        continue-on-error: true
