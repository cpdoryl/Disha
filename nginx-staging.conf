upstream disha_api_staging {
    least_conn;
    server api-staging:3000 max_fails=3 fail_timeout=30s;
}

# Redirect HTTP to HTTPS in staging
server {
    listen 80;
    server_name staging.example.com staging-api.example.com localhost;

    # Allow for ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check endpoint (no redirect)
    location /health {
        proxy_pass http://disha_api_staging;
        access_log off;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

