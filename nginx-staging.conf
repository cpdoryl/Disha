upstream disha_api_staging {
    least_conn;
    server api-staging:3000 max_fails=3 fail_timeout=30s;
}

# Redirect HTTP to HTTPS in staging
server {
    listen 80;
    server_name staging.example.com staging-api.example.com localhost;

    # Allow for ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check endpoint (no redirect)
    location /health {
        proxy_pass http://disha_api_staging;
        access_log off;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server (staging)
server {
    listen 443 ssl http2;
    server_name staging.example.com staging-api.example.com;

    # SSL configuration (update paths to your certificates)
    # ssl_certificate /etc/ssl/certs/cert.pem;
    # ssl_certificate_key /etc/ssl/private/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Client max body size
    client_max_body_size 50M;

    # Health check endpoint (no logging)
    location /health {
        access_log off;
        proxy_pass http://disha_api_staging;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # API routes
    location /api/ {
        proxy_pass http://disha_api_staging;
        proxy_http_version 1.1;

        # Preserve headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Request-ID $request_id;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Swagger/API documentation
    location /docs {
        proxy_pass http://disha_api_staging;
    }

    location /swagger {
        proxy_pass http://disha_api_staging;
    }

    # Deny direct access to sensitive paths
    location ~ /admin {
        return 403;
    }

    location ~ /\.git {
        return 403;
    }

    location ~ /\. {
        return 403;
    }

    # GZIP compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
}
