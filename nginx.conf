# Production Nginx config. Was a straight copy of nginx-staging.conf —
# still named/targeted for staging (upstream "disha_api_staging" pointing
# at "api-staging:3000", server_name "staging.example.com") despite being
# the file implied to be the production counterpart alongside
# nginx-staging.conf. Retargeted to the production naming used in
# DEPLOYMENT_GUIDE.md's docker-compose.prod.yml template (service "api",
# PORT 3001 — see that file's Step 3.4 for why 3001, not 3000).
#
# This file is API-only, same as nginx-staging.conf — it has no location
# block proxying to the frontend. DEPLOYMENT_GUIDE.md § Step 4 has a
# fuller inline example that also proxies "/" to a frontend upstream on
# port 3000; use that version (or add an equivalent location block here)
# for a deployment where nginx should serve the frontend too, rather than
# running the frontend behind a separate public entry point.
upstream disha_api {
    least_conn;
    server api:3001 max_fails=3 fail_timeout=30s;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name disha.yourdomain.com;

    # Allow for ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check endpoint (no redirect)
    location /health {
        proxy_pass http://disha_api;
        access_log off;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name disha.yourdomain.com;

    # SSL configuration (update paths to your certificates — see
    # DEPLOYMENT_GUIDE.md § Step 5 for Let's Encrypt setup)
    ssl_certificate /etc/letsencrypt/live/disha.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/disha.yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Client max body size
    client_max_body_size 50M;

    # Health check endpoint (no logging)
    location /health {
        access_log off;
        proxy_pass http://disha_api;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # Prometheus metrics — restrict to internal/monitoring network only;
    # never expose this publicly (see SECURITY_CHECKLIST.md and
    # MONITORING_SETUP.md — this endpoint is intentionally unauthenticated
    # at the application layer, so network-level restriction here is the
    # actual access control for it).
    location /metrics {
        allow 127.0.0.1;
        # allow <your Prometheus server's IP/CIDR>;
        deny all;
        proxy_pass http://disha_api;
        access_log off;
    }

    # API routes
    location /api/ {
        proxy_pass http://disha_api;
        proxy_http_version 1.1;

        # Preserve headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Request-ID $request_id;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Swagger/API documentation — consider restricting this the same way
    # as /metrics above before going live; it documents the full API
    # surface including internal-only endpoints.
    location /docs {
        proxy_pass http://disha_api;
    }

    # Deny direct access to sensitive paths
    location ~ /admin {
        return 403;
    }

    location ~ /\.git {
        return 403;
    }

    location ~ /\. {
        return 403;
    }

    # GZIP compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
}
