upstream disha_api {
    least_conn;
    server api:3000 max_fails=3 fail_timeout=30s;
    # Add more servers for load balancing
    # server api2:3000 max_fails=3 fail_timeout=30s;
    # server api3:3000 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 50M;

    # Redirect HTTP to HTTPS in production
    # Uncomment for production with valid SSL certificate
    # return 301 https://$server_name$request_uri;

    # Health check endpoint (for load balancer)
    location /health {
        access_log off;
        proxy_pass http://disha_api;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # API routes
    location /api/ {
        proxy_pass http://disha_api;
        proxy_http_version 1.1;

        # Preserve headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Request-ID $request_id;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Static files / Documentation
    location /docs {
        proxy_pass http://disha_api;
        access_log off;
    }

    location /swagger {
        proxy_pass http://disha_api;
        access_log off;
    }

    # Deny direct access to sensitive paths
    location ~ /admin {
        return 403;
    }

    location ~ /\.git {
        return 403;
    }

    location ~ /\. {
        return 403;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # GZIP compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
}

